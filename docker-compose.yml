services:
  api:
    build:
      context: ./demo-rest
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  tests:
    build:
      context: .
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    command: npm run test:integration
